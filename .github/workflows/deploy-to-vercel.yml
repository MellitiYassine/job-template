name: Deploy Branch to Vercel

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (e.g. template/software-developer)'
        required: true
        type: string
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - preview
          - production
        default: preview

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: refs/heads/${{ inputs.branch }}
          fetch-depth: 1

      - name: Confirm checked out branch
        run: |
          echo "Branch: $(git branch --show-current)"
          echo "Files:"
          ls -la

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel project settings
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=${{ inputs.environment }} --token=$VERCEL_TOKEN

      - name: Build
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "${{ inputs.environment }}" == "production" ]; then
            vercel build --prod --token=$VERCEL_TOKEN
          else
            vercel build --token=$VERCEL_TOKEN
          fi

      - name: Deploy
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ "${{ inputs.environment }}" == "production" ]; then
            URL=$(vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN)
          else
            URL=$(vercel deploy --prebuilt --token=$VERCEL_TOKEN)
          fi
          echo "DEPLOY_URL=$URL" >> $GITHUB_ENV
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Print deployed URL
        run: |
          echo "-------------------------------"
          echo "Branch   : ${{ inputs.branch }}"
          echo "Env      : ${{ inputs.environment }}"
          echo "URL      : ${{ steps.deploy.outputs.url }}"
          echo "-------------------------------"
